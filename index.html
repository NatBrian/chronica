<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chronica</title>
  <style>
    /* anti-flash critical style; the full theme lives in src/ui/theme.css */
    html, body { height: 100%; margin: 0; background: #12101a; }
  </style>
</head>
<body>
  <div id="landing">
    <h1>CHRONICA</h1>
    <div class="sub">Watch a world write its own history.</div>
    <canvas id="gen-preview" width="256" height="256"></canvas>
    <div class="row">
      <input id="seed-input" type="text" placeholder="seed" value="42" />
      <button class="ctl" id="btn-random">Random</button>
      <button class="ctl" id="btn-begin">Begin History</button>
    </div>
    <div class="row" style="margin-top:4px;gap:6px">
      <span style="color:#9badb7;font-size:12px">ollama</span>
      <input id="ollama-url" type="text" placeholder="http://localhost:11434" style="width:180px;font-size:13px" />
      <button class="ctl" id="btn-ollama-save" style="font-size:12px">Save</button>
    </div>
    <div id="llm-status">Checking for local kings...</div>
    <details id="world-laws" style="color:#9badb7;font-size:13px;margin-top:6px">
      <summary style="cursor:pointer">⚖ world laws (set once, at creation)</summary>
      <div style="display:grid;grid-template-columns:auto auto;gap:6px 14px;margin-top:10px;text-align:left">
        <label>aggression</label><select id="law-aggression" class="ctl"><option value="70">meek</option><option value="100" selected>classic</option><option value="150">bloody</option></select>
        <label>fertility</label><select id="law-fertility" class="ctl"><option value="80">sparse</option><option value="100" selected>classic</option><option value="125">teeming</option></select>
        <label>lifespan</label><select id="law-lifespan" class="ctl"><option value="75">short</option><option value="100" selected>classic</option><option value="130">long</option></select>
        <label>disasters</label><select id="law-disaster" class="ctl"><option value="50">gentle</option><option value="100" selected>classic</option><option value="200">harsh</option></select>
        <label>monsters &amp; plagues</label><select id="law-injectors" class="ctl"><option value="1" selected>on</option><option value="0">off</option></select>
        <label>turning ages</label><select id="law-erawheel" class="ctl"><option value="1" selected>on</option><option value="0">off</option></select>
      </div>
    </details>
    <details id="byok-config" style="color:#9badb7;font-size:13px;margin-top:4px">
      <summary style="cursor:pointer">🔑 API key (thinking kings without ollama)</summary>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 10px;margin-top:8px;align-items:center;text-align:left">
        <label>Provider</label>
        <select id="byok-provider" class="ctl">
          <option value="openrouter">OpenRouter</option>
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI compatible</option>
        </select>
        <label>API key</label>
        <input id="byok-key" type="password" style="width:100%;padding:4px 8px;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:4px" />
        <label id="byok-url-label">Base URL</label>
        <input id="byok-url" type="text" placeholder="https://api.openai.com/v1" style="width:100%;padding:4px 8px;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:4px" />
        <label>Model</label>
        <input id="byok-model" type="text" style="width:100%;padding:4px 8px;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:4px" />
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="ctl" id="btn-byok-save" style="font-size:12px">Save</button>
        <button class="ctl" id="btn-byok-clear" style="font-size:12px">Clear</button>
        <span id="byok-status" style="font-size:12px;align-self:center"></span>
      </div>
    </details>
    <div id="resume-list"></div>
  </div>
  <div id="tab-notice">This world is open in another tab : this tab is read-only.</div>
  <div id="search-overlay">
    <div id="search-box">
      <input id="search-input" placeholder="Search characters, places, events, chapters…" />
      <div id="search-results"></div>
    </div>
  </div>
  <div id="app">
    <div id="world-wrap">
      <canvas id="world"></canvas>
      <div id="vignette"></div>
      <div id="hud"><span id="hud-year">Year 0</span> · <span id="hud-pop">-</span><div class="era" id="hud-island"></div></div>
      <div id="hud-factions"></div>
      <div id="war-strip"></div>
      <div id="inspector" style="display:none"></div>
      <div id="seek-status"></div>
      <div id="postcard-caption"></div>
      <div id="llm-badge">…</div>
      <div id="overlay-bar">
        <button class="ctl ov" data-ov="territory" title="territory (T)">🏳</button>
        <button class="ctl ov" data-ov="pop" title="population (P)">👥</button>
        <button class="ctl ov" data-ov="food" title="food scarcity (F)">🌾</button>
        <button class="ctl ov" data-ov="war" title="war fronts (Shift+W)">⚔</button>
      </div>
      <div id="overlay-legend"></div>
      <div id="ov-tip"></div>
      <canvas id="minimap" width="140" height="140"></canvas>
      <div id="hint" style="display:none"></div>
      <div id="council-panel" style="display:none"></div>
      <div id="digest-card"></div>
      <div id="char-sheet" style="display:none"></div>
      <div id="toast-stack"></div>
      <div id="chain-view">
        <h5>WHY THIS HAPPENED <span style="float:right;cursor:pointer" id="chain-close">✕</span></h5>
        <div id="chain-nodes"></div>
      </div>
    </div>
    <div id="chronicle-rail">
      <div id="rail-tabs">
        <button class="rtab active" data-tab="chronicle">📖 Chronicle</button>
        <button class="rtab" data-tab="events">Events<span class="badge" id="badge-events"></span></button>
        <button class="rtab" data-tab="councils">Councils<span class="badge" id="badge-councils"></span></button>
        <button class="rtab" data-tab="stats">Stats</button>
        <button id="rail-close" title="close rail">✕</button>
      </div>
      <div id="tab-chronicle" class="rail-tab">
        <div id="chron-head">
          <span id="chron-lag"></span>
          <button class="ctl" id="btn-chron-font" title="font size">A±</button>
          <button class="ctl" id="btn-chron-export" title="export the history book">⬇ book</button>
        </div>
        <div id="chron-toc"></div>
        <div id="chron-body"></div>
      </div>
      <div id="tab-events" class="rail-tab" style="display:none">
        <div id="ev-filters"></div>
        <div id="ev-list"></div>
      </div>
      <div id="tab-councils" class="rail-tab" style="display:none">
        <div id="cl-filters"></div>
        <div id="cl-list"></div>
      </div>
      <div id="tab-stats" class="rail-tab" style="display:none"></div>
    </div>
    <div id="event-feed" title="open the full event log"></div>
    <div id="timeline-bar">
      <button class="ctl" id="btn-pause">⏸</button>
      <button class="ctl speed" data-s="1" title="kings think deeply">1×</button>
      <button class="ctl speed active" data-s="4" title="kings think quickly">4×</button>
      <button class="ctl speed" data-s="16" title="kings rule by instinct">16×</button>
      <canvas id="timeline" height="44"></canvas>
      <div id="tl-tooltip" style="display:none"></div>
      <span id="replay-badge" style="display:none">REPLAY</span>
      <button class="ctl" id="btn-present" style="display:none">Jump to present ▶▶</button>
      <div id="year-label">Year 0</div>
      <button class="ctl" id="btn-book" title="the history book (C)">book</button>
      <button class="ctl" id="btn-director" title="director mode: camera follows the story">🎬</button>
      <button class="ctl" id="btn-timelapse" title="export a 200-year timelapse (webm)">🎞</button>
      <button class="ctl" id="btn-export" title="export journal (share this world)">⬇</button>
      <button class="ctl" id="btn-import" title="import journal">⬆</button>
      <input type="file" id="import-file" accept=".json" style="display:none" />
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
