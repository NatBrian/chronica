<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronica</title>
  <style>
    :root {
      --bg: #14141f; --panel: #1c1c2b; --panel2: #23233a; --border: #34345230;
      --text: #cbdbfc; --dim: #9badb7; --accent: #639bff; --warn: #d95763;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif; font-size: 14px; }
    #app { display: grid; height: 100vh;
      grid-template-columns: 1fr auto;
      grid-template-rows: 1fr auto auto;
      grid-template-areas: "world chronicle" "feed feed" "timeline timeline"; }
    #world-wrap { grid-area: world; position: relative; overflow: hidden; }
    #world { width: 100%; height: 100%; display: block; image-rendering: pixelated; cursor: grab; }
    #world.dragging { cursor: grabbing; }
    #hud { position: absolute; top: 10px; left: 10px; background: #14141fcc;
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
      font-variant-numeric: tabular-nums; pointer-events: none; }
    #hud .era { color: var(--dim); font-size: 12px; }
    /* per-faction HUD chips (11 §I2): the island's pulse, always on */
    #hud-factions { position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 10; }
    .fhud { background: #14141fcc; border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px; font-size: 12px; cursor: pointer; display: flex; align-items: center;
      gap: 5px; font-variant-numeric: tabular-nums; }
    .fhud:hover { border-color: var(--accent); }
    .fhud .sw { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .fhud .up { color: #6abe30; } .fhud .down { color: #d95763; }
    .fhud canvas { display: block; }
    body.postcard #hud-factions { display: none !important; }
    #inspector { position: absolute; top: 10px; right: 10px; width: 260px;
      background: #14141fee; border: 1px solid var(--border); border-radius: 8px;
      padding: 12px; font-size: 13px; max-height: 80%; overflow-y: auto; }
    #inspector h4 { font-weight: 500; margin-bottom: 8px; }
    #inspector .bar { height: 6px; background: #23233a; border-radius: 3px; margin: 2px 0 6px; }
    #inspector .bar > div { height: 100%; border-radius: 3px; background: var(--accent); }
    #inspector .lbl { color: var(--dim); font-size: 11px; display: flex; justify-content: space-between; }
    #inspector .offer { display: flex; justify-content: space-between; color: var(--dim); font-size: 12px; }
    #inspector .close { float: right; cursor: pointer; color: var(--dim); }
    #chronicle-rail { grid-area: chronicle; width: 0; background: var(--panel);
      border-left: 1px solid var(--border); overflow: hidden; transition: width .2s;
      font-size: 14px; display: flex; flex-direction: column; }
    #chronicle-rail.open { width: 380px; padding: 12px; }
    /* reading mode (G4): pause + open panel = wide rail, dimmed world */
    body.reading #chronicle-rail.open { width: 500px; }
    body.reading #world { filter: brightness(0.6); }
    #rail-tabs { display: none; gap: 4px; margin-bottom: 10px; flex-shrink: 0; }
    #chronicle-rail.open #rail-tabs { display: flex; }
    .rtab { background: var(--panel2); color: var(--dim); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 13px; position: relative; }
    .rtab.active { background: var(--accent); color: #14141f; }
    .rtab .badge { background: var(--warn); color: #fff; font-size: 10px; border-radius: 8px;
      padding: 0 5px; margin-left: 4px; display: none; }
    .rail-tab { flex: 1; overflow-y: auto; min-height: 0; }
    /* Events tab (G1) */
    #ev-filters { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
    .fchip { background: var(--panel2); color: var(--dim); border: 1px solid var(--border);
      border-radius: 10px; padding: 2px 9px; cursor: pointer; font-size: 12px; }
    .fchip.on { color: var(--text); border-color: var(--fc, var(--accent)); background: #23233a; }
    .ev-row { display: flex; gap: 7px; padding: 5px 4px; cursor: pointer; border-radius: 4px;
      font-size: 13px; line-height: 1.4; align-items: baseline; }
    .ev-row:hover { background: var(--panel2); }
    .ev-row .yr { color: var(--dim); font-size: 11px; min-width: 42px; text-align: right;
      font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .ev-row .gl { flex-shrink: 0; width: 18px; text-align: center; }
    .ev-row .fc { width: 3px; align-self: stretch; border-radius: 2px; flex-shrink: 0; }
    .ev-row .tx { flex: 1; overflow-wrap: anywhere; }
    .ev-row.sev4 .tx { color: var(--text); } .ev-row.sev5 .tx { color: var(--warn); font-weight: 600; }
    .ev-row .tx { color: var(--dim); }
    /* Councils tab */
    .cl-row { padding: 8px 6px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .cl-row .hd { display: flex; justify-content: space-between; color: var(--dim); font-size: 11px; }
    .cl-row .ch { margin: 3px 0; }
    .cl-row .rs { color: var(--dim); font-style: italic; line-height: 1.45; }
    .cl-row .src-llm { color: var(--accent); }
    /* catch-up digest (G3) */
    #digest-card { position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
      background: #16161ff5; border: 1px solid var(--accent); border-radius: 10px;
      padding: 14px 18px; max-width: 440px; z-index: 35; display: none; }
    #digest-card h4 { font-weight: 500; margin-bottom: 8px; }
    #digest-card .dg-row { padding: 4px 0; cursor: pointer; color: var(--dim); font-size: 13px; }
    #digest-card .dg-row:hover { color: var(--text); }
    #chron-head { display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; gap: 8px; }
    #chron-lag { color: var(--dim); font-size: 11px; font-style: italic; }
    #chron-toc { margin-bottom: 12px; }
    #chron-toc .era-h { color: var(--accent); font-size: 12px; letter-spacing: 1px;
      margin: 10px 0 4px; text-transform: uppercase; }
    #chron-toc .toc-ch { color: var(--dim); font-size: 13px; padding: 3px 6px;
      cursor: pointer; border-radius: 4px; }
    #chron-toc .toc-ch:hover { background: var(--panel2); color: var(--text); }
    #chron-body h4 { font-weight: 600; margin: 14px 0 2px; font-size: 16px; }
    #chron-body .ch-meta { color: var(--dim); font-size: 11px; margin-bottom: 8px; }
    #chron-body p { line-height: 1.65; margin-bottom: 10px; cursor: pointer;
      border-left: 2px solid transparent; padding-left: 8px; }
    #chron-body p:hover { border-left-color: var(--accent); background: #639bff0a; }
    #chron-empty { color: var(--dim); font-style: italic; padding: 20px 6px; }
    /* search overlay */
    /* layout minimums (07): 1280×720 floor; drawer + collapse below that */
    @media (max-width: 1439px) {
      #chronicle-rail.open { position: fixed; right: 0; top: 0; bottom: 88px; z-index: 45;
        box-shadow: -8px 0 24px #000a; }
    }
    @media (max-height: 899px) {
      #event-feed { height: 22px; font-size: 12px; }
    }
    /* chronicle font size (A11y) */
    #chronicle-rail.big-font #chron-body { font-size: 16px; }
    #search-overlay { position: fixed; inset: 0; background: #14141fcc; z-index: 60;
      display: none; padding-top: 12vh; justify-content: center; align-items: flex-start; }
    #search-box { width: 480px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; }
    #search-input { width: 100%; background: var(--panel2); border: none; color: var(--text);
      padding: 12px 16px; font-size: 16px; outline: none; }
    #search-results { max-height: 50vh; overflow-y: auto; }
    .sr { padding: 8px 16px; cursor: pointer; display: flex; justify-content: space-between; }
    .sr:hover, .sr.sel { background: var(--panel2); }
    .sr .kind { color: var(--dim); font-size: 11px; }
    #event-feed { grid-area: feed; height: 28px; background: var(--panel);
      border-top: 1px solid var(--border); overflow: hidden; display: flex; align-items: center;
      padding: 0 10px; gap: 18px; white-space: nowrap; color: var(--dim); font-size: 13px; }
    #event-feed .ev { cursor: pointer; }
    #event-feed .ev:hover { color: var(--text); }
    #event-feed .sev4 { color: var(--warn); }
    #event-feed .sev5 { color: var(--warn); font-weight: 600; }
    #chain-view { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #14141ff2; border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 16px; display: none; max-width: 90%; z-index: 15; }
    #chain-view h5 { color: var(--dim); font-weight: 400; margin-bottom: 8px; font-size: 12px;
      letter-spacing: 1px; }
    #chain-nodes { display: flex; align-items: center; gap: 8px; overflow-x: auto; }
    .chain-node { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 12px; max-width: 200px; cursor: pointer; flex-shrink: 0; }
    .chain-node:hover { border-color: var(--accent); }
    .chain-node .cy { color: var(--accent); font-weight: 600; }
    .chain-arrow { color: var(--dim); flex-shrink: 0; }
    #timeline-bar { grid-area: timeline; background: var(--panel2); border-top: 1px solid var(--border);
      padding: 8px 12px; display: flex; align-items: center; gap: 12px; }
    #timeline { flex: 1; height: 34px; cursor: pointer;
      background: #14141f; border-radius: 4px; }
    #tl-tooltip { position: fixed; bottom: 54px; background: #1c1c2bf2; border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; font-size: 12px; pointer-events: none;
      max-width: 300px; transform: translateX(-50%); z-index: 20; }
    #tl-tooltip .yr { color: var(--accent); font-weight: 600; }
    #replay-badge { background: var(--warn); color: #14141f; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 3px; letter-spacing: 1px;
      animation: replayPulse 1.2s ease-in-out infinite; }
    @keyframes replayPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
    #seek-status { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #1c1c2bee; padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
      color: var(--dim); display: none; }
    #tab-notice { position: fixed; inset: 0; background: #14141fee; z-index: 100;
      display: none; align-items: center; justify-content: center; font-size: 18px; color: var(--dim); }
    #overlay-bar { position: absolute; bottom: 160px; left: 10px; display: flex; gap: 4px; }
    #overlay-bar .ov.active { background: var(--accent); }
    #minimap { position: absolute; bottom: 12px; left: 10px; border: 1px solid var(--border);
      border-radius: 6px; image-rendering: pixelated; cursor: pointer; background: #14141f; }
    #hint { position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
      background: #1c1c2bf0; border: 1px solid var(--accent); border-radius: 8px;
      padding: 10px 16px; font-size: 13px; max-width: 380px; z-index: 40; }
    body.postcard #hud, body.postcard #inspector, body.postcard #event-feed,
    body.postcard #timeline-bar, body.postcard #chronicle-rail, body.postcard #overlay-bar,
    body.postcard #minimap, body.postcard #llm-badge, body.postcard #toast-stack { display: none !important; }
    body.postcard #app { grid-template-rows: 1fr 0 0; grid-template-columns: 1fr 0; }
    #postcard-caption { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: var(--text); font-size: 18px; letter-spacing: 2px; text-shadow: 0 1px 4px #000;
      display: none; }
    body.postcard #postcard-caption { display: block; }
    #toast-stack { position: absolute; bottom: 60px; right: 14px; display: flex;
      flex-direction: column; gap: 8px; z-index: 25; }
    .toast { background: #1c1c2bf2; border: 1px solid var(--border); border-left: 3px solid var(--accent);
      border-radius: 6px; padding: 8px 12px; font-size: 13px; max-width: 300px; cursor: pointer;
      animation: toastIn .25s ease; }
    .toast.war { border-left-color: var(--warn); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; } }
    #council-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 430px; max-height: 80%; overflow-y: auto; background: #16161ff5;
      border: 1px solid var(--border); border-radius: 10px; padding: 18px; z-index: 30; }
    #council-panel h3 { font-weight: 500; margin-bottom: 4px; }
    #council-panel .sub { color: var(--dim); font-size: 12px; margin-bottom: 12px; }
    #council-panel .reasoning { background: #1c1c2b; border-left: 3px solid var(--accent);
      padding: 10px 12px; border-radius: 4px; font-style: italic; margin: 10px 0; line-height: 1.5; }
    #council-panel .opt { padding: 4px 8px; border-radius: 4px; color: var(--dim); font-size: 12px; }
    #council-panel .opt.chosen { background: #639bff22; color: var(--text); border: 1px solid #639bff55; }
    #council-panel .src { font-size: 11px; color: var(--dim); margin-top: 10px; }
    #llm-badge { position: absolute; top: 64px; left: 10px; background: #14141fcc;
      border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px;
      color: var(--dim); }
    button.ctl { background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 13px; }
    button.ctl:hover { background: var(--panel2); border-color: var(--accent); }
    button.ctl.active { background: var(--accent); color: #14141f; }
    #year-label { min-width: 90px; text-align: center; font-variant-numeric: tabular-nums; }
    /* landing overlay */
    #landing { position: fixed; inset: 0; background: var(--bg); z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
    #landing h1 { font-size: 42px; letter-spacing: 8px; color: var(--text); font-weight: 300; }
    #landing .sub { color: var(--dim); margin-bottom: 20px; }
    #landing .row { display: flex; gap: 10px; align-items: center; }
    #landing input { background: var(--panel); border: 1px solid var(--border); color: var(--text);
      padding: 8px 12px; border-radius: 4px; width: 140px; font-size: 15px; }
    #landing button { font-size: 15px; padding: 8px 18px; }
    #llm-status { color: var(--dim); font-size: 13px; margin-top: 10px; }
    #gen-preview { width: 256px; height: 256px; image-rendering: pixelated;
      border: 1px solid var(--border); border-radius: 6px; display: none; }
  </style>
</head>
<body>
  <div id="landing">
    <h1>CHRONICA</h1>
    <div class="sub">Watch a world write its own history.</div>
    <canvas id="gen-preview" width="256" height="256"></canvas>
    <div class="row">
      <input id="seed-input" type="text" placeholder="seed" value="42" />
      <button class="ctl" id="btn-random">Random</button>
      <button class="ctl" id="btn-begin">Begin History</button>
    </div>
    <div id="llm-status">Checking for local kings...</div>
    <div id="resume-list"></div>
  </div>
  <div id="tab-notice">This world is open in another tab : this tab is read-only.</div>
  <div id="search-overlay">
    <div id="search-box">
      <input id="search-input" placeholder="Search characters, places, events, chapters…" />
      <div id="search-results"></div>
    </div>
  </div>
  <div id="app">
    <div id="world-wrap">
      <canvas id="world"></canvas>
      <div id="hud"><span id="hud-year">Year 0</span> · <span id="hud-pop">-</span><div class="era" id="hud-island"></div></div>
      <div id="hud-factions"></div>
      <div id="inspector" style="display:none"></div>
      <div id="seek-status"></div>
      <div id="postcard-caption"></div>
      <div id="llm-badge">…</div>
      <div id="overlay-bar">
        <button class="ctl ov" data-ov="territory" title="territory (T)">🏳</button>
        <button class="ctl ov" data-ov="pop" title="population (P)">👥</button>
        <button class="ctl ov" data-ov="food" title="food scarcity (F)">🌾</button>
        <button class="ctl ov" data-ov="war" title="war fronts (Shift+W)">⚔</button>
      </div>
      <canvas id="minimap" width="140" height="140"></canvas>
      <div id="hint" style="display:none"></div>
      <div id="council-panel" style="display:none"></div>
      <div id="digest-card"></div>
      <div id="toast-stack"></div>
      <div id="chain-view">
        <h5>WHY THIS HAPPENED <span style="float:right;cursor:pointer" id="chain-close">✕</span></h5>
        <div id="chain-nodes"></div>
      </div>
    </div>
    <div id="chronicle-rail">
      <div id="rail-tabs">
        <button class="rtab active" data-tab="chronicle">📖 Chronicle</button>
        <button class="rtab" data-tab="events">Events<span class="badge" id="badge-events"></span></button>
        <button class="rtab" data-tab="councils">Councils<span class="badge" id="badge-councils"></span></button>
        <button class="rtab" data-tab="stats">Stats</button>
      </div>
      <div id="tab-chronicle" class="rail-tab">
        <div id="chron-head">
          <span id="chron-lag"></span>
          <button class="ctl" id="btn-chron-font" title="font size">A±</button>
          <button class="ctl" id="btn-chron-export" title="export the history book">⬇ book</button>
        </div>
        <div id="chron-toc"></div>
        <div id="chron-body"></div>
      </div>
      <div id="tab-events" class="rail-tab" style="display:none">
        <div id="ev-filters"></div>
        <div id="ev-list"></div>
      </div>
      <div id="tab-councils" class="rail-tab" style="display:none">
        <div id="cl-filters"></div>
        <div id="cl-list"></div>
      </div>
      <div id="tab-stats" class="rail-tab" style="display:none"></div>
    </div>
    <div id="event-feed" title="open the full event log"></div>
    <div id="timeline-bar">
      <button class="ctl" id="btn-pause">⏸</button>
      <button class="ctl speed" data-s="1" title="kings think deeply">1×</button>
      <button class="ctl speed active" data-s="4" title="kings think quickly">4×</button>
      <button class="ctl speed" data-s="16" title="kings rule by instinct">16×</button>
      <canvas id="timeline" height="34"></canvas>
      <div id="tl-tooltip" style="display:none"></div>
      <span id="replay-badge" style="display:none">REPLAY</span>
      <button class="ctl" id="btn-present" style="display:none">Jump to present ▶▶</button>
      <div id="year-label">Year 0</div>
      <button class="ctl" id="btn-export" title="export journal (share this world)">⬇</button>
      <button class="ctl" id="btn-import" title="import journal">⬆</button>
      <input type="file" id="import-file" accept=".json" style="display:none" />
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
